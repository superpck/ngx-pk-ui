<tr class="pk-dg-row">
  @if (hasDetail) {
    <td class="pk-dg-expand-btn-cell">
      <button class="pk-dg-expand-btn" [class.expanded]="isExpanded" (click)="isExpanded=!isExpanded; $event.stopPropagation()" title="ขยาย/ย่อ">
        <pk-icon
          iconSet="material-symbols"
          [name]="isExpanded ? 'keyboard_arrow_down' : 'keyboard_arrow_right'"
          [size]="16"
          color="currentColor"
        ></pk-icon>
      </button>
    </td>
  } @else {
    <td class="pk-dg-expand-btn-cell pk-dg-no-detail"></td>
  }
  <ng-content></ng-content>
</tr>
@if (isExpanded) {
  <tr class="pk-dg-row-detail">
    <td [attr.colspan]="999">
      <ng-content select="pk-dg-row-detail"></ng-content>
    </td>
  </tr>
}
