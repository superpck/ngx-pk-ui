<td class="pk-dg-action-cell">
  <button class="pk-dg-action-btn" [class.active]="isOpen" (click)="toggle($event)" title="Actions">
    <pk-icon name="menu" [size]="16" color="currentColor"></pk-icon>
  </button>
  @if (isOpen) {
    <div class="pk-dg-action-menu"
      [style.top.px]="menuPos.top"
      [style.left.px]="menuPos.left"
      (click)="isOpen = false; $event.stopPropagation()">
      <ng-content></ng-content>
    </div>
  }
</td>
