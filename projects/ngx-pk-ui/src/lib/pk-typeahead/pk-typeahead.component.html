<div class="pk-typeahead" [ngClass]="customClass" [ngStyle]="customStyle">
  <input
    type="text"
    class="pk-typeahead-input"
    [value]="value"
    [disabled]="disabled"
    [placeholder]="placeholder"
    [style]="style"
    autocomplete="off"
    (input)="onInput($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    (keydown)="onKeydown($event)">

  @if (isOpen && filteredItems.length > 0) {
  <div class="pk-typeahead-panel">
    @for (item of filteredItems; track trackByItem($index, item); let index = $index) {
    <button
      type="button"
      class="pk-typeahead-option"
      [class.active]="index === highlightedIndex"
      (mousedown)="$event.preventDefault()"
      (click)="selectItem(item)">
      {{ getItemLabel(item) }}
    </button>
    }
  </div>
  }
</div>
