<tr class="pk-dg-row" [class]="rowClass">
  <ng-content select="pk-dg-action"></ng-content>
  @if (hasDetail) {
    <td class="pk-dg-expand-btn-cell">
      <button class="pk-dg-expand-btn" [class.expanded]="isExpanded" (click)="isExpanded=!isExpanded" title="ขยาย/ย่อ">
        <pk-icon [name]="isExpanded ? 'chevron-down' : 'chevron-right'" [size]="16" color="currentColor"></pk-icon>
      </button>
    </td>
  } @else {
    <td class="pk-dg-expand-btn-cell pk-dg-no-detail"></td>
  }
  <ng-content></ng-content>
</tr>
@if (isExpanded) {
  <tr class="pk-dg-row-expand">
    <td [attr.colspan]="999">
      <ng-content select="pk-dg-row-expand"></ng-content>
    </td>
  </tr>
}
