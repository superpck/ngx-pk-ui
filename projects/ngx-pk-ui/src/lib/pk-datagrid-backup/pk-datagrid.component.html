<div class="pk-datagrid-container">
  @if (pkDgLoading) {
    <div class="pk-datagrid-spinner">
      <div class="spinner"></div>
      <span>Loading...</span>
    </div>
  }
  
  <div class="pk-datagrid-scroll-area">
  <table class="pk-datagrid" style="table-layout: fixed" [style.min-width.px]="totalWidth">
    <thead>
      <tr>
        @if (hasActionCol) {
          <th class="pk-dg-action-th"></th>
        }
        @if (hasExpandCol) {
          <th class="pk-dg-expand-th"></th>
        } @else {
          <th class="pk-dg-expand-th pk-dg-no-detail"></th>
        }
        @for (column of columns; track i; let i = $index) {
          <th [style.width.px]="columnWidths[i]">
            <div class="th-content">
              <span>{{ column.headerText }}</span>
              <div class="th-actions">
                @if (column.pkDgSort) {
                  <button class="sort-icon-btn"
                    [class.active]="sortColumn === column.pkDgSort"
                    (click)="onSort(column.pkDgSort)"
                    title="เรียงลำดับ">
                    <pk-icon
                      [name]="sortColumn === column.pkDgSort ? (sortDirection === 'asc' ? 'chevron-up' : 'chevron-down') : 'sort'"
                      [size]="12" color="currentColor">
                    </pk-icon>
                  </button>
                }
                @if (column.pkDgFilter) {
                  <button class="filter-icon-btn"
                    [class.active]="filterValues[column.pkDgFilter]"
                    (click)="openFilter(column.pkDgFilter, $event, column.headerText)"
                    title="กรอง">
                    <pk-icon name="search" [size]="12" color="currentColor"></pk-icon>
                  </button>
                }
              </div>
            </div>
            @if (column.pkDgFilter && activeFilterCol === column.pkDgFilter) {
              <div class="filter-popup"
                [style.top.px]="filterPopupPos.top"
                [style.left.px]="filterPopupPos.left"
                (click)="$event.stopPropagation()">
                <input type="text"
                  [value]="filterValues[column.pkDgFilter] || ''"
                  (input)="onFilterInput(column.pkDgFilter, $event)"
                  [placeholder]="'ค้นหา ' + activeFilterHeader"
                  autofocus>
              </div>
            }
            <div class="resize-handle" (mousedown)="startResize(i, $event)"></div>
          </th>
        }
      </tr>
    </thead>
    <tbody>
      <ng-content select="pk-dg-rows"></ng-content>
    </tbody>
  </table>
  </div>

  <ng-content select="pk-dg-footer"></ng-content>
</div>
