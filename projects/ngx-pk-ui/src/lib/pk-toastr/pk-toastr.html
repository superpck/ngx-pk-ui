<div class="pk-toastr-container" aria-live="polite" aria-atomic="false">
  @for (toast of toastr.toasts(); track toast.id) {
    <div
      class="pk-toast pk-toast--{{ toast.type }}"
      role="alert"
    >
      <div class="pk-toast__body">
        @if (toast.title) {
          <strong class="pk-toast__title">{{ toast.title }}</strong>
        }
        <span class="pk-toast__message">{{ toast.message }}</span>
      </div>
      <button
        class="pk-toast__close"
        aria-label="Dismiss"
        (click)="toastr.dismiss(toast.id)"
      >✕</button>
    </div>
  }
</div>
