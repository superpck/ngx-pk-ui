@if (_visible()) {
  <div
    [class]="_panelClass()"
    [style.top.px]="_top()"
    [style.left.px]="_left()"
    role="menu"
    aria-label="Context menu"
  >
    @for (item of _items(); track $index; let i = $index) {
      @if (item.separator) {
        <div class="pk-cm__sep" role="separator"></div>
      } @else {
        <button
          class="pk-cm__item"
          [class.pk-cm__item--disabled]="item.disabled"
          [class.pk-cm__item--highlighted]="_highlightIndex() === i"
          type="button"
          [disabled]="item.disabled ?? false"
          role="menuitem"
          (click)="onItemClick(item, $event)"
          (mouseenter)="_highlightIndex.set(i)"
          (mouseleave)="_highlightIndex.set(-1)"
        >
          @if (item.icon) {
            <span class="pk-cm__item-icon material-symbols-outlined">{{ item.icon }}</span>
          }
          <span class="pk-cm__item-title">{{ item.title }}</span>
        </button>
      }
    }
  </div>
}
