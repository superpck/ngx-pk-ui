<div
  class="pk-pwdinput"
  [class]="customClass()"
  [style]="customStyle()"
>
  <!-- Input row: floating-label field + toggle button -->
  <div class="pk-pwdinput__field">
    <input
      class="pk-pwdinput__input"
      [type]="_visible() ? 'text' : 'password'"
      [id]="_id()"
      [value]="_value()"
      [disabled]="_disabled()"
      [autocomplete]="autocomplete()"
      placeholder=" "
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
    <label class="pk-pwdinput__label" [for]="_id()">{{ label() }}</label>

    <button
      type="button"
      class="pk-pwdinput__toggle"
      tabindex="-1"
      [attr.aria-label]="_visible() ? 'Hide password' : 'Show password'"
      (click)="toggleVisibility()"
    >
      <pk-icon
        [name]="_visible() ? 'visibility_off' : 'visibility'"
        iconSet="material-symbols"
        [size]="18"
        color="currentColor"
      />
    </button>
  </div>

  <!-- Strength indicator (opt-in) -->
  @if (showStrength() && _value().length > 0) {
    <div class="pk-pwdinput__strength">
      <pk-progress [config]="_progressConfig()" />
      <span class="pk-pwdinput__strength-label pk-pwdinput__strength--{{ _strengthStatus() }}">
        {{ _strengthLabel() }}
      </span>
    </div>
  }
</div>
