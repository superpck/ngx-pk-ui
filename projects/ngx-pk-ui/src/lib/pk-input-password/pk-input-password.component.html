<!-- components/password-input/password-input.component.html -->
<div class="password-container" [ngClass]="customClass" [ngStyle]="customStyle">
  <input
    [type]="showPassword ? 'text' : 'password'"
    [value]="value"
    (input)="onInputChange($event)"
    [style]="style"
    [disabled]="disabled"
    [placeholder]="placeholder"
    class="password-input"/>
  <button
    type="button"
    class="toggle-button"
    (click)="togglePasswordVisibility()"
    [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
    <span class="toggle-icon" style="border: none;">
      {{ showPassword ? '🔓' : '🔐' }}
    </span>
  </button>
</div>
