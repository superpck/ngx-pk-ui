@if (openModal()) {
  <div
    class="pk-modal-overlay"
    [class.pk-modal-overlay--blur]="blur()"
    (click)="onOverlayClick()"
  >
    <div
      [class]="dialogClass()"
      [ngStyle]="customStyle()"
      (click)="$event.stopPropagation()"
    >
      @if (closeMarker()) {
        <button
          class="pk-modal-close-btn"
          type="button"
          aria-label="Close modal"
          (click)="close()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      }

      <ng-content select="pk-modal-header" />
      <ng-content select="pk-modal-body" />
      <ng-content select="pk-modal-footer" />
      <!-- fallback for unslotted content -->
      <ng-content />
    </div>
  </div>
}
