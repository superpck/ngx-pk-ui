<div [class]="_hostClass()" [style]="customStyle()">
  @if (title()) {
    <div class="pk-otp__title">{{ title() }}</div>
  }
  @if (text()) {
    <div class="pk-otp__text">{{ text() }}</div>
  }
  <div class="pk-otp__inputs">
    @for (i of cells(); track i) {
      <input
        #otpInput
        class="pk-otp__input"
        type="text"
        [attr.inputmode]="type() === 'number' ? 'numeric' : 'text'"
        autocomplete="one-time-code"
        [disabled]="_isDisabled()"
        (focus)="onFocus(i)"
        (blur)="onBlur()"
        (keydown)="onKeyDown($event, i)"
        (input)="onInput($event, i)"
        (paste)="onPaste($event, i)"
      />
    }
  </div>

  @if (timeout() > 0) {
    <div class="pk-otp__timeout" [class.pk-otp__timeout--expired]="_expired()">
      <div class="pk-otp__timeout-bar">
        <div
          class="pk-otp__timeout-fill"
          [class.pk-otp__timeout-fill--warn]="_remainingPct() < 40"
          [class.pk-otp__timeout-fill--danger]="_remainingPct() < 15"
          [style.width.%]="_remainingPct()"
        ></div>
      </div>
      @if (_expired()) {
        <span class="pk-otp__timeout-label pk-otp__timeout-label--expired">Expired</span>
      } @else {
        <span class="pk-otp__timeout-label">{{ _remainingLabel() }}</span>
      }
    </div>
  }
</div>
