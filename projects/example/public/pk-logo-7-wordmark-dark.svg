<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">
  <defs>
    <linearGradient id="wmd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="wmd-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="wmd-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Dark bg pill -->
  <rect x="0" y="0" width="300" height="72" rx="18" fill="#0f172a"/>
  <rect x="1" y="1" width="298" height="70" rx="17"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- ── Icon badge (52×52, vertically centered at y=10) ── -->
  <rect x="10" y="10" width="52" height="52" rx="13" fill="url(#wmd-bg)"/>
  <rect x="10" y="10" width="52" height="52" rx="13" fill="url(#wmd-shine)"/>
  <rect x="11" y="11" width="50" height="50" rx="12"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- widgets icon — 36px icon centered at 36,36 (relative to badge origin 10,10) -->
  <rect x="22" y="22" width="11" height="11" rx="2" fill="white"/>
  <polygon points="42,21 49,28 42,35 35,28" fill="white"/>
  <rect x="22" y="38" width="27" height="10" rx="2" fill="white"/>

  <!-- ── Text block ── -->
  <text x="78" y="32"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="22">
    <tspan font-family="'Courier New',Courier,monospace"
           font-weight="400" font-size="18" fill="rgba(148,163,184,0.7)">ngx-</tspan><tspan fill="url(#wmd-text)">pk-ui</tspan>
  </text>

  <text x="78" y="51"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="10.5" fill="rgba(148,163,184,0.45)" letter-spacing="1.8">
    Angular Component Library
  </text>
</svg>
