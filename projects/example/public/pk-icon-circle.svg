<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="b-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="b-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.24)"/>
      <stop offset="60%"  stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <circle cx="103" cy="107" r="90" fill="rgba(37,99,235,0.20)"/>

  <!-- Main circle -->
  <circle cx="100" cy="100" r="90" fill="url(#b-bg)"/>

  <!-- Shine -->
  <circle cx="100" cy="100" r="90" fill="url(#b-shine)"/>

  <!-- Inner border -->
  <circle cx="100" cy="100" r="88.5"
          fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>

  <!-- widgets icon — same coords as square version -->
  <!-- Top-left square -->
  <rect x="58" y="58" width="38" height="38" rx="6" fill="white"/>

  <!-- Diamond (top-right) — center (133,77) half 20 -->
  <polygon points="133,57 153,77 133,97 113,77" fill="white"/>

  <!-- Bottom wide rect -->
  <rect x="58" y="106" width="84" height="36" rx="6" fill="white"/>
</svg>
