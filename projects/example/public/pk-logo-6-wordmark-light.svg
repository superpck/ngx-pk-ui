<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">
  <defs>
    <linearGradient id="wm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="wm-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- ── Icon badge (72 × 72) ── -->
  <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#wm-bg)"/>
  <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#wm-shine)"/>
  <rect x="1.5" y="1.5" width="69" height="69" rx="14.5"
        fill="none" stroke="rgba(255,255,255,0.24)" stroke-width="1"/>

  <!-- widgets icon inside badge — scaled to fit ~40px area centered at 36,36 -->
  <!-- Top-left square (original 2,2 → 9×9): shift so total icon is 36px wide, centered -->
  <!-- Icon group: 38px wide, 38px tall. Start x=17, y=17 -->
  <!-- Top-left rect: x=17,y=17 w=15 h=15 rx=2 -->
  <rect x="17" y="17" width="15" height="15" rx="2" fill="white"/>
  <!-- Diamond center: x=47,y=24.5 half=8 -->
  <polygon points="47,16.5 55,24.5 47,32.5 39,24.5" fill="white"/>
  <!-- Bottom rect: x=17,y=38 w=38 h=14 rx=2 -->
  <rect x="17" y="38" width="38" height="14" rx="2" fill="white"/>

  <!-- ── Text block ── starts at x=86 -->
  <!-- "ngx-" light + "pk-ui" bold -->
  <text x="86" y="32"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="24" fill="#111827">
    <tspan font-family="'Courier New',Courier,monospace"
           font-weight="400" font-size="20" fill="#9ca3af">ngx-</tspan><tspan fill="#111827">pk-ui</tspan>
  </text>

  <!-- Tagline below -->
  <text x="86" y="52"
        font-family="'Helvetica Neue',Arial,sans-serif"
        font-size="11" fill="#9ca3af" letter-spacing="1.5">
    Angular Component Library
  </text>
</svg>
